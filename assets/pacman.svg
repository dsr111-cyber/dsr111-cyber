<svg width="1000" height="250" viewBox="0 0 1000 250"
xmlns="http://www.w3.org/2000/svg">

<style>
.bg{
fill:#0d1117;
}

.cell{
fill:#1f6f43;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{fill:#39d353;}
}

.pacman{
animation:movePacman 12s linear infinite;
}

.ghost{
animation:moveGhost 12s linear infinite;
}

@keyframes movePacman{
0%{transform:translate(0px,0px);}
100%{transform:translate(700px,0px);}
}

@keyframes moveGhost{
0%{transform:translate(-40px,0px);}
100%{transform:translate(660px,0px);}
}
</style>

<rect width="100%" height="100%" class="bg"/>

<!-- DURGESH -->

<text
x="40"
y="140"
font-size="90"
font-family="monospace"
fill="#39d353"
font-weight="bold">
DURGESH
</text>

<!-- PACMAN -->

<g class="pacman">

<circle
cx="100"
cy="100"
r="18"
fill="yellow"/>

<polygon
points="100,100 118,90 118,110"
fill="#0d1117"/>

</g>

<!-- GHOST -->

<g class="ghost">

<rect
x="40"
y="80"
width="30"
height="30"
rx="10"
fill="#ff0000"/>

<circle
cx="48"
cy="92"
r="3"
fill="white"/>

<circle
cx="60"
cy="92"
r="3"
fill="white"/>

</g>

</svg>
