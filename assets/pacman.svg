<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComponentTransfer in="blur" result="glow1">
                <feFuncA type="linear" slope="1.5"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="glow1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
        </filter>

        <rect id="c" width="14" height="14" rx="3" />
        <rect id="sc" width="6" height="6" rx="1" />
        
        <pattern id="bg-grid" width="18" height="18" patternUnits="userSpaceOnUse">
            <use href="#c" x="0" y="0" fill="#161b22" />
        </pattern>

        <path id="robotLoop" d="M 319 86 L 895 86 L 895 176 L 319 176 Z" fill="none" />
        <path id="enemy1Loop" d="M 157 86 L 247 86 L 247 176 L 157 176 Z" fill="none" />
        <path id="enemy2Loop" d="M 931 86 L 1021 86 L 1021 176 L 931 176 Z" fill="none" />
        <path id="enemy3Path" d="M 319 194 L 895 194" fill="none" />

        <g id="robot" filter="url(#shadow)">
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="1.5s" repeatCount="indefinite" />
                <rect x="-12" y="-12" width="24" height="24" rx="8" fill="#f0f6fc" />
                <rect x="-8" y="-4" width="16" height="10" rx="3" fill="#0d1117" />
                <g filter="url(#neon-cyan)">
                    <circle cx="-4" cy="1" r="2" fill="#00ffff" />
                    <circle cx="4" cy="1" r="2" fill="#00ffff" />
                    <animate attributeName="opacity" values="1; 1; 0; 1; 1" keyTimes="0; 0.45; 0.48; 0.5; 1" dur="4s" repeatCount="indefinite" />
                </g>
                <line x1="0" y1="-12" x2="0" y2="-18" stroke="#f0f6fc" stroke-width="2" />
                <circle cx="0" cy="-19" r="2" fill="#00ffff" filter="url(#neon-cyan)" />
            </g>
        </g>

        <g id="ghost">
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="1s" repeatCount="indefinite" />
                <path d="M -10 10 L -10 -2 A 10 10 0 0 1 10 -2 L 10 10 L 6 7 L 0 10 L -6 7 Z" />
                <circle cx="-4" cy="-2" r="3" fill="#ffffff" />
                <circle cx="4" cy="-2" r="3" fill="#ffffff" />
                <circle cx="-3" cy="-2" r="1.5" fill="#0d1117" />
                <circle cx="5" cy="-2" r="1.5" fill="#0d1117" />
            </g>
        </g>
    </defs>

    <style>
        .pulse { animation: pulse 3s infinite alternate; }
        .flicker { animation: flicker 4s infinite; }
        .flicker2 { animation: flicker 5s infinite reverse; }
        .glow-text { fill: #39d353; filter: url(#glow); }
        .maze-wall { stroke: #ffffff; stroke-width: 2.5; fill: none; stroke-linejoin: round; stroke-linecap: round; opacity: 0.9; }
        .maze-dots { stroke: #e3b341; stroke-width: 4; stroke-dasharray: 0 18; stroke-linecap: round; fill: none; opacity: 0.8; }
        .ai-trace { stroke: #00ffff; fill: none; stroke-width: 1.5; opacity: 0.4; }
        @keyframes pulse { 0% { opacity: 0.7; } 100% { opacity: 1; filter: brightness(1.2); } }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } 70% { opacity: 0.8; } 80% { opacity: 0.2; } }
    </style>

    <rect x="123" y="70" width="954" height="126" fill="url(#bg-grid)" />

    <g class="ai-trace">
        <path d="M 141 88 L 159 106 L 195 106 M 159 106 L 159 142 L 177 160 M 933 160 L 969 160 L 987 142 L 987 106 M 1041 124 L 1059 124 L 1077 106" />
